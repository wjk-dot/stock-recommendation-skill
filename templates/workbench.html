<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>统一量化工作台</title>
  <style>
    :root{--bg:#090d14;--panel:#111824;--panel2:#172131;--line:#29364a;--text:#e6edf5;--muted:#91a0b3;--red:#ef5350;--green:#23bf91;--blue:#68a8ff;--yellow:#f0b951;--radius:12px;font-family:Inter,"Microsoft YaHei",system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,#142641 0,var(--bg) 34rem);color:var(--text);font-size:14px}.top{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;gap:20px;padding:17px clamp(18px,4vw,52px);background:#090d14eF;border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}h1,h2,h3,p{margin:0}.brand h1{font-size:20px}.brand p{margin-top:5px;color:var(--muted);font-size:12px}.health{display:flex;align-items:center;gap:8px;color:var(--muted);white-space:nowrap}.dot{width:8px;height:8px;border-radius:50%;background:var(--yellow)}.dot.ok{background:var(--green)}.dot.bad{background:var(--red)}.wrap{max-width:1500px;margin:auto;padding:24px clamp(18px,4vw,52px) 48px}.panel{background:linear-gradient(140deg,#141d2b,#101722);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 10px 28px #0002}.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}.section-head h2{font-size:15px}.muted{color:var(--muted)}.small{font-size:12px}.notice{display:none;margin:0 0 16px;padding:12px 14px;color:#ffe0a0;border:1px solid #654e25;border-radius:9px;background:#302510}.notice.show{display:block}.session{margin-bottom:16px}.session-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.tag{font:12px ui-monospace,Consolas,monospace;padding:4px 7px;border-radius:5px;background:#203048;color:#b9d5ff}.profile{padding:13px 18px;display:flex;gap:9px;flex-wrap:wrap}.profile-item{border-radius:6px;padding:6px 8px;background:#1a2638;color:var(--muted);font-size:12px}.profile-item strong{color:var(--text);font-weight:600}.cards{padding:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}.card{position:relative;background:var(--panel2);border:1px solid #2d3a4e;border-radius:10px;padding:15px;overflow:hidden}.card:hover{border-color:var(--blue)}.card-top{display:flex;justify-content:space-between;gap:8px;align-items:start}.name{font-size:17px;font-weight:700}.code,.sector{color:var(--muted);font-size:12px;margin-top:3px}.rec{padding:4px 8px;border-radius:20px;font-size:11px;font-weight:700;background:#223651;color:#b9d6ff}.rec.buy,.rec.strong_buy{color:#ffc4c0;background:#55282b}.rec.avoid{color:#a9ead7;background:#183b33}.rec.caution{color:#f4d58f;background:#46381e}.price{font:700 26px ui-monospace,Consolas,monospace;margin-top:14px}.change.up{color:var(--red)}.change.down{color:var(--green)}.reason{color:#c3cedd;line-height:1.55;font-size:12px;margin:12px 0 9px;padding-top:10px;border-top:1px solid #2d3a4e}.risk{color:#e6bd68;font-size:11px;line-height:1.5}.btn{appearance:none;border:1px solid #3d506c;background:#1d2b3e;color:var(--text);border-radius:7px;padding:8px 11px;cursor:pointer;font:inherit}.btn:hover{border-color:#79b2ff}.btn.primary{background:var(--blue);border-color:var(--blue);color:#07111f;font-weight:700}.btn:disabled{cursor:wait;opacity:.6}.card .btn{margin-top:13px;width:100%}.research{margin-top:18px;display:grid;grid-template-columns:minmax(0,1.6fr) minmax(330px,.7fr);gap:16px}.toolbar{padding:15px;display:flex;gap:10px;flex-wrap:wrap;align-items:end}.field{display:flex;flex-direction:column;gap:5px}.field label{font-size:11px;color:var(--muted)}input{min-width:92px;border:1px solid #344359;border-radius:6px;background:#0b111b;color:var(--text);padding:8px;font:inherit}.chart-body{padding:14px}.chart{height:390px;background:#0b111b;border-radius:8px;overflow:hidden}.chart canvas{width:100%;height:100%}.empty{height:100%;display:grid;place-items:center;color:var(--muted)}.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}.stat{background:var(--panel2);border-radius:7px;padding:10px}.stat label{display:block;color:var(--muted);font-size:11px}.stat strong{display:block;margin-top:5px;font:700 16px ui-monospace,Consolas,monospace}.backtest-body{padding:15px}.form{display:grid;grid-template-columns:1fr 1fr;gap:9px}.wide{grid-column:1/-1}.note{margin-top:12px;color:var(--muted);line-height:1.55;font-size:12px}.result{margin-top:15px}.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.result-item{padding:9px;background:var(--panel2);border-radius:7px}.result-item span{display:block;font-size:11px;color:var(--muted)}.result-item strong{display:block;margin-top:4px;font-family:ui-monospace,Consolas,monospace}.trades{max-height:220px;overflow:auto;margin-top:13px}.trades table{width:100%;border-collapse:collapse;font-size:12px}.trades td,.trades th{padding:8px;text-align:right;border-bottom:1px solid var(--line)}.trades td:first-child,.trades th:first-child{text-align:left}.flow{margin-top:16px}.flow-body{padding:15px}.flow-summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}.flow-summary .tag{background:#1b2a3d}.flow-list{display:grid;gap:8px}.flow-row{display:grid;grid-template-columns:minmax(120px,1fr) 130px 62px;gap:12px;align-items:center;padding:10px;background:var(--panel2);border-radius:7px}.bar{height:6px;background:#2a384b;border-radius:10px;overflow:hidden;margin-top:5px}.bar i{display:block;height:100%;background:var(--red)}.bar i.out{background:var(--green)}@media(max-width:960px){.research{grid-template-columns:1fr}.stat-grid{grid-template-columns:1fr 1fr}}@media(max-width:560px){.top{display:block}.health{margin-top:10px}.wrap{padding:16px}.cards{padding:12px}.chart{height:290px}.flow-row{grid-template-columns:minmax(90px,1fr) 95px 50px}.section-head{align-items:start}.stat-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <header class="top"><div class="brand"><h1>统一量化工作台</h1><p>推荐会话 · 日线 K 线 · 成本回测 · 市场资金流</p></div><div class="health"><i id="health-dot" class="dot"></i><span id="health">检查后端中…</span></div></header>
  <main class="wrap">
    <div id="notice" class="notice"></div>
    <section class="panel session">
      <div class="section-head"><div><h2>本次 Codex 推荐</h2><p id="session-subtitle" class="muted small">正在读取最新推荐会话…</p></div><div class="session-meta"><span id="session-id" class="tag">未加载</span><button id="reload-session" class="btn">刷新推荐</button></div></div>
      <div id="profile" class="profile"></div><div id="cards" class="cards"><div class="empty">正在读取推荐结果…</div></div>
    </section>
    <section class="research">
      <div class="panel">
        <div class="section-head"><div><h2>个股量化研究</h2><p id="bar-meta" class="muted small">从推荐卡片选择股票，或手动输入代码</p></div><span id="selected-name" class="tag">未选择</span></div>
        <div class="toolbar"><div class="field"><label>股票代码</label><input id="symbol" value="000001" maxlength="6" inputmode="numeric"></div><div class="field"><label>开始日期</label><input id="start" type="date"></div><div class="field"><label>结束日期</label><input id="end" type="date"></div><button id="load-bars" class="btn primary">加载 K 线</button></div>
        <div class="chart-body"><div id="chart" class="chart"><div class="empty">尚未加载历史日线</div></div><div class="stat-grid"><div class="stat"><label>最新收盘</label><strong id="last-close">--</strong></div><div class="stat"><label>区间涨跌</label><strong id="period-return">--</strong></div><div class="stat"><label>区间最高</label><strong id="high">--</strong></div><div class="stat"><label>区间最低</label><strong id="low">--</strong></div></div></div>
      </div>
      <aside class="panel"><div class="section-head"><div><h2>均线交叉回测</h2><p class="muted small">次交易日开盘成交 · 费用已计入</p></div></div><div class="backtest-body"><div class="form"><div class="field"><label>初始资金（元）</label><input id="cash" type="number" min="100" step="100" value="100000"></div><div class="field"><label>佣金费率</label><input id="commission" type="number" min="0" step="0.0001" value="0.0003"></div><div class="field"><label>最低佣金（元）</label><input id="min-commission" type="number" min="0" step="1" value="5"></div><div class="field"><label>印花税率</label><input id="stamp" type="number" min="0" step="0.0001" value="0.0005"></div><div class="field"><label>过户费率</label><input id="transfer" type="number" min="0" step="0.00001" value="0.00001"></div><div class="field"><label>滑点费率</label><input id="slippage" type="number" min="0" step="0.0001" value="0.0002"></div><div class="field"><label>快均线</label><input id="fast" type="number" min="1" value="5"></div><div class="field"><label>慢均线</label><input id="slow" type="number" min="2" value="20"></div><button id="run-backtest" class="btn primary wide">运行历史回测</button></div><p class="note">按 100 股整手；佣金、最低佣金、卖出印花税、双向过户费和滑点均进入结果。历史结果不代表未来收益。</p><div id="result" class="result" hidden><div class="result-grid"><div class="result-item"><span>累计收益</span><strong id="bt-return">--</strong></div><div class="result-item"><span>最大回撤</span><strong id="bt-drawdown">--</strong></div><div class="result-item"><span>最终权益</span><strong id="bt-equity">--</strong></div><div class="result-item"><span>交易次数</span><strong id="bt-trades">--</strong></div></div><div class="trades"><table><thead><tr><th>日期</th><th>方向</th><th>价格</th><th>数量</th><th>费用</th></tr></thead><tbody id="trade-rows"></tbody></table></div></div></div></aside>
    </section>
    <section class="panel flow"><div class="section-head"><div><h2>市场资金流向</h2><p id="flow-meta" class="muted small">行业资金流，数据源不可用时明确提示</p></div><button id="refresh-flow" class="btn">刷新资金流</button></div><div class="flow-body"><div id="flow-summary" class="flow-summary"></div><div id="flow-list" class="flow-list"><div class="empty" style="height:90px">尚未加载市场资金流</div></div></div></section>
  </main>
<script>
const $=s=>document.querySelector(s), api=()=>location.origin, fmt=n=>Number(n||0).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}), pct=n=>`${(Number(n||0)*100).toFixed(2)}%`, today=new Date(), oneYear=new Date(today); oneYear.setFullYear(today.getFullYear()-1); $('#start').value=oneYear.toISOString().slice(0,10); $('#end').value=today.toISOString().slice(0,10);
let bars=[], session=null; const labels={strong_buy:'强烈推荐',buy:'推荐买入',watch:'观望',caution:'谨慎',avoid:'回避'};
function tell(text){const e=$('#notice');e.textContent=text||'';e.classList.toggle('show',!!text)} function sourceName(s){return({cache:'本地缓存',baostock:'Baostock',akshare:'AkShare','cache-stale':'缓存（行情源暂不可用）'})[s]||s||'未知来源'}
async function read(r){const t=await r.text();try{return t?JSON.parse(t):{}}catch{return{detail:t}}} function errorOf(j,fallback){let d=j?.detail??j;if(typeof d==='string')return d;if(d&&typeof d==='object')return `${d.message||fallback}${d.attempted_sources?.length?`（已尝试：${d.attempted_sources.join('、')}）`:''}`;return fallback}
function setBusy(button,busy,text){if(!button.dataset.label)button.dataset.label=button.textContent;button.disabled=busy;button.textContent=busy?text:button.dataset.label}
function profileItem(label,value){return `<span class="profile-item">${label}：<strong>${escapeHtml(value)}</strong></span>`} function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function renderSession(doc){session=doc; const meta=doc.meta||{},p=doc.user_profile||{},fees=p.fees||{};$('#session-id').textContent=doc.session_id||'本地会话';$('#session-subtitle').textContent=`${meta.title||'本次推荐'} · ${meta.generated_at||doc.created_at||'时间未知'} · ${doc.stocks.length} 只股票`;$('#profile').innerHTML=[profileItem('资金',p.only_recommendations?'只看推荐':`¥${fmt(p.capital_cny||0)}`),profileItem('持有周期',{short:'短线',swing:'波段',long:'长线'}[p.horizon]||'未设置'),profileItem('风险',{conservative:'稳健',balanced:'均衡',aggressive:'激进'}[p.risk_level]||'未设置'),profileItem('市场',(p.markets||[]).join(' / ')||'未设置'),profileItem('费率',`佣金 ${(Number(fees.commission_rate??.0003)*10000).toFixed(1)} 万分`) ].join(''); if(!p.only_recommendations&&Number(p.capital_cny)>0)$('#cash').value=p.capital_cny;if(fees.commission_rate!=null)$('#commission').value=fees.commission_rate;if(fees.min_commission_cny!=null)$('#min-commission').value=fees.min_commission_cny;if(fees.stamp_duty_rate!=null)$('#stamp').value=fees.stamp_duty_rate;if(fees.transfer_rate!=null)$('#transfer').value=fees.transfer_rate;
$('#cards').innerHTML=doc.stocks.map(stock=>{const c=Number(stock.change_pct||0),cls=c>=0?'up':'down',rec=stock.recommendation||'watch';return `<article class="card"><div class="card-top"><div><div class="name">${escapeHtml(stock.name||stock.code)}</div><div class="code">${escapeHtml(stock.code)} · ${escapeHtml(stock.sector||'未分类')}</div></div><span class="rec ${rec}">${labels[rec]||'观察'}</span></div><div class="price">¥${fmt(stock.price)}</div><div class="change ${cls}">${c>=0?'+':''}${c.toFixed(2)}%</div><p class="reason">${escapeHtml((stock.reasons||['暂无推荐理由']).slice(0,2).join('；'))}</p><p class="risk">风险：${escapeHtml((stock.risk_factors||['请结合市场波动自行判断']).slice(0,2).join('；'))}</p><button class="btn" data-code="${escapeHtml(stock.code)}" data-name="${escapeHtml(stock.name||stock.code)}">研究此股</button></article>`}).join('');document.querySelectorAll('[data-code]').forEach(b=>b.onclick=()=>research(b.dataset.code,b.dataset.name));}
async function loadSession(){const b=$('#reload-session');try{setBusy(b,true,'刷新中…');const r=await fetch(`${api()}/api/recommendations/latest`),j=await read(r);if(!r.ok)throw Error(errorOf(j,'读取推荐会话失败'));renderSession(j);tell('')}catch(e){session=null;$('#session-id').textContent='尚未发布';$('#session-subtitle').textContent='请先由 Skill 生成 recommendations.json 并运行 publish_recommendations.py';$('#profile').innerHTML='';$('#cards').innerHTML='<div class="empty">没有可用推荐会话。量化研究区仍可手动输入股票代码。</div>';tell(e.message)}finally{setBusy(b,false,'')}}
function research(code,name){$('#symbol').value=String(code).trim();$('#selected-name').textContent=name||code;document.querySelector('.research').scrollIntoView({behavior:'smooth',block:'start'});loadBars()}
function ma(index,period){if(index<period-1)return null;let sum=0;for(let i=index-period+1;i<=index;i++)sum+=Number(bars[i].close);return sum/period}
function draw(){const root=$('#chart');root.innerHTML='<canvas></canvas>';const canvas=root.firstChild,d=devicePixelRatio||1,rect=canvas.getBoundingClientRect(),w=Math.max(rect.width,100),h=Math.max(rect.height,100);canvas.width=w*d;canvas.height=h*d;const x=canvas.getContext('2d');x.scale(d,d);const pad={l:49,r:16,t:17,b:34},volH=62,priceH=h-pad.t-pad.b-volH,lo=Math.min(...bars.map(b=>Number(b.low))),hi=Math.max(...bars.map(b=>Number(b.high))),range=hi-lo||1,scale=v=>pad.t+(hi-v)/range*(priceH-8),step=(w-pad.l-pad.r)/bars.length,candle=Math.max(1,step*.68),maxVol=Math.max(...bars.map(b=>Number(b.volume)||0),1);x.font='11px system-ui';for(let i=0;i<5;i++){const y=pad.t+i*(priceH-8)/4;x.strokeStyle='#263449';x.beginPath();x.moveTo(pad.l,y);x.lineTo(w-pad.r,y);x.stroke();x.fillStyle='#91a0b3';x.fillText((hi-range*i/4).toFixed(2),3,y+4)}bars.forEach((b,i)=>{const cx=pad.l+(i+.5)*step,up=Number(b.close)>=Number(b.open),color=up?'#ef5350':'#23bf91',yo=scale(Number(b.open)),yc=scale(Number(b.close));x.strokeStyle=color;x.fillStyle=color;x.beginPath();x.moveTo(cx,scale(Number(b.high)));x.lineTo(cx,scale(Number(b.low)));x.stroke();x.fillRect(cx-candle/2,Math.min(yo,yc),candle,Math.max(1,Math.abs(yc-yo)));const vh=(Number(b.volume)||0)/maxVol*(volH-5);x.globalAlpha=.45;x.fillRect(cx-candle/2,h-pad.b-vh,candle,vh);x.globalAlpha=1});[[5,'#68a8ff'],[20,'#f0b951']].forEach(([period,color])=>{x.strokeStyle=color;x.lineWidth=1.2;x.beginPath();let on=false;bars.forEach((_,i)=>{const value=ma(i,period);if(value==null){on=false;return}const px=pad.l+(i+.5)*step,py=scale(value);if(!on){x.moveTo(px,py);on=true}else x.lineTo(px,py)});x.stroke()});x.fillStyle='#68a8ff';x.fillText('MA5',pad.l,h-10);x.fillStyle='#f0b951';x.fillText('MA20',pad.l+42,h-10)}
async function loadBars(){const b=$('#load-bars');try{const symbol=$('#symbol').value.trim(),start=$('#start').value,end=$('#end').value;if(!/^\d{6}$/.test(symbol))throw Error('股票代码必须是 6 位数字');if(!start||!end||start>end)throw Error('请填写有效的回测日期范围');setBusy(b,true,'加载中…');tell('');const r=await fetch(`${api()}/api/stocks/${encodeURIComponent(symbol)}/daily?start=${start}&end=${end}`),j=await read(r);if(!r.ok)throw Error(errorOf(j,'历史行情加载失败'));bars=j.bars||[];if(!bars.length)throw Error('指定区间没有可用交易日数据');draw();const first=Number(bars[0].close),last=Number(bars.at(-1).close),change=last/first-1;$('#last-close').textContent=fmt(last);$('#period-return').textContent=pct(change);$('#period-return').className=change>=0?'up':'down';$('#high').textContent=fmt(Math.max(...bars.map(v=>Number(v.high))));$('#low').textContent=fmt(Math.min(...bars.map(v=>Number(v.low))));$('#bar-meta').textContent=`${bars.length} 个交易日 · ${sourceName(j.data_source)} · 蓝色 MA5 / 黄色 MA20`;$('#selected-name').textContent=session?.stocks?.find(v=>String(v.code)===symbol)?.name||symbol;if(j.warnings?.length)tell(j.warnings.join('；'))}catch(e){bars=[];$('#chart').innerHTML='<div class="empty">历史行情尚未加载</div>';tell(e.message)}finally{setBusy(b,false,'')}}
async function backtest(){const b=$('#run-backtest');try{if(!bars.length)throw Error('先加载 K 线，确认历史行情可用后再回测');const body={symbol:$('#symbol').value.trim(),start_date:$('#start').value,end_date:$('#end').value,strategy:'ma_cross',parameters:{fast_period:Number($('#fast').value),slow_period:Number($('#slow').value)},initial_cash:Number($('#cash').value),fees:{commission_rate:Number($('#commission').value),min_commission_cny:Number($('#min-commission').value),stamp_duty_rate:Number($('#stamp').value),transfer_rate:Number($('#transfer').value),slippage_rate:Number($('#slippage').value)}};if(body.parameters.fast_period>=body.parameters.slow_period)throw Error('快均线必须小于慢均线');setBusy(b,true,'回测中…');tell('');const r=await fetch(`${api()}/api/backtests`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}),j=await read(r);if(!r.ok)throw Error(errorOf(j,'回测失败'));$('#result').hidden=false;$('#bt-return').textContent=pct(j.total_return);$('#bt-drawdown').textContent=pct(j.max_drawdown);$('#bt-equity').textContent=`¥${fmt(j.final_equity)}`;$('#bt-trades').textContent=j.trade_count;$('#trade-rows').innerHTML=(j.trades||[]).map(t=>`<tr><td>${t.trade_date}</td><td class="${t.side==='buy'?'up':'down'}">${t.side==='buy'?'买入':'卖出'}</td><td>${fmt(t.price)}</td><td>${t.quantity}</td><td>${fmt(t.fees)}</td></tr>`).join('')||'<tr><td colspan="5" style="text-align:center;color:#91a0b3">该区间没有产生均线交叉交易信号</td></tr>';if(j.warnings?.length)tell(j.warnings.join('；'))}catch(e){tell(e.message)}finally{setBusy(b,false,'')}}
function flowMoney(v){const n=Number(v||0),a=Math.abs(n);return `${n>=0?'+':'-'}${(a>=1e8?a/1e8:a/1e4).toFixed(2)}${a>=1e8?'亿':'万'}`}async function loadFlow(){const b=$('#refresh-flow'),list=$('#flow-list');try{setBusy(b,true,'刷新中…');list.innerHTML='<div class="empty" style="height:90px">加载市场资金流中…</div>';const r=await fetch(`${api()}/api/market-flow?refresh=true`),j=await read(r);if(!r.ok)throw Error(errorOf(j,'市场资金流加载失败'));$('#flow-meta').textContent=`${j.source||'未知来源'} · ${j.scope||'未知范围'} · ${j.as_of?new Date(j.as_of).toLocaleString('zh-CN'):''}`;const summary=[];if(j.net_inflow_cny!=null)summary.push(`<span class="tag">全市场净流入：${flowMoney(j.net_inflow_cny)}</span>`);if(j.up_count!=null)summary.push(`<span class="tag">上涨 ${j.up_count} / 下跌 ${j.down_count??'--'}</span>`);$('#flow-summary').innerHTML=summary.join('');const sectors=j.sectors||[];if(!sectors.length){list.innerHTML=`<div class="empty" style="height:90px">${escapeHtml((j.warnings||['暂时没有可验证的行业资金流数据']).join('；'))}</div>`;return}const max=Math.max(...sectors.map(s=>Math.abs(Number(s.net_inflow_cny)||0)),1);list.innerHTML=sectors.map(s=>{const v=Number(s.net_inflow_cny)||0;return `<div class="flow-row"><div><strong>${escapeHtml(s.name||'未命名行业')}</strong><div class="bar"><i class="${v<0?'out':''}" style="width:${Math.max(3,Math.abs(v)/max*100)}%"></i></div></div><strong class="${v>=0?'up':'down'}">${flowMoney(v)}</strong><span class="muted">${Number(s.change_pct||0).toFixed(2)}%</span></div>`}).join('')}catch(e){list.innerHTML=`<div class="empty" style="height:90px">${escapeHtml(e.message)}</div>`}finally{setBusy(b,false,'')}}
async function health(){try{const r=await fetch(`${api()}/api/health`);if(!r.ok)throw 0;$('#health').textContent='后端已连接';$('#health-dot').className='dot ok'}catch{$('#health').textContent='后端不可用';$('#health-dot').className='dot bad'}}$('#reload-session').onclick=loadSession;$('#load-bars').onclick=loadBars;$('#run-backtest').onclick=backtest;$('#refresh-flow').onclick=loadFlow;health();loadSession();
</script>
</body>
</html>
