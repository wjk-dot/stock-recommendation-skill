<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>A股量化研究控制台</title><style>
:root{--bg:#0d1117;--p:#151b24;--p2:#1b2430;--l:#2b3644;--t:#e6edf3;--m:#8b98a8;--r:#ef5350;--g:#29b58f;--b:#5aa7ff;--w:#f2b84b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font:14px system-ui,"Microsoft YaHei",sans-serif}.top{padding:22px 28px;border-bottom:1px solid var(--l);display:flex;justify-content:space-between}.top h1{margin:0 0 6px;font-size:25px}.m{color:var(--m)}.wrap{max-width:1440px;margin:auto;padding:22px 28px}.toolbar,.panel{background:var(--p);border:1px solid var(--l);border-radius:8px}.toolbar{padding:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:end}.field{display:flex;flex-direction:column;gap:5px}.field label{color:var(--m);font-size:11px}.input{background:#0f141b;border:1px solid var(--l);color:var(--t);border-radius:5px;padding:8px 10px}.btn{border:1px solid var(--l);background:var(--p2);color:var(--t);padding:8px 13px;border-radius:5px;cursor:pointer}.primary{background:var(--b);color:#08111c;font-weight:700}.grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(340px,.65fr);gap:16px;margin-top:16px}.panel{overflow:hidden}.head{padding:13px 16px;border-bottom:1px solid var(--l);display:flex;justify-content:space-between}.body{padding:16px}.chart{height:430px;background:#10161e}.chart canvas{width:100%;height:100%}.empty{height:100%;display:grid;place-items:center;color:var(--m)}.stats,.rg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.stat,.ri,.fr{background:var(--p2);padding:10px;border-radius:5px}.stat label,.ri span{display:block;color:var(--m);font-size:11px}.stat strong,.ri strong{display:block;margin-top:4px;font:700 18px ui-monospace,Consolas,monospace}.up{color:var(--r)}.down{color:var(--g)}.form{display:grid;grid-template-columns:1fr 1fr;gap:10px}.wide{grid-column:1/-1}.note{color:var(--m);font-size:12px;line-height:1.55}.message{display:none;margin-top:12px;padding:10px;border-left:3px solid var(--w);color:var(--w)}.message.show{display:block}.tw{overflow:auto;max-height:240px;margin-top:12px}.table{width:100%;border-collapse:collapse;font-size:12px}.table th,.table td{padding:8px;border-bottom:1px solid var(--l);text-align:right}.table th:first-child,.table td:first-child{text-align:left}.fl{display:grid;gap:8px}.fr{display:grid;grid-template-columns:1fr 110px 70px;gap:10px;align-items:center}.bar{height:7px;background:#263241;border-radius:4px;overflow:hidden;margin-top:5px}.bar i{display:block;height:100%;background:var(--r)}.bar i.out{background:var(--g)}@media(max-width:900px){.grid{grid-template-columns:1fr}.top{display:block}.stats,.rg{grid-template-columns:repeat(2,1fr)}}
</style></head><body><header class="top"><div><h1>A股量化研究控制台</h1><p class="m">日线K线、交易成本回测与市场资金流向</p></div><div id="status" class="m">正在检查后端...</div></header><main class="wrap"><section class="toolbar"><div class="field"><label>后端地址（可选）</label><input id="api" class="input" placeholder="自动使用当前页面" style="width:220px"></div><div class="field"><label>股票代码</label><input id="symbol" class="input" value="000001" style="width:100px"></div><div class="field"><label>开始日期</label><input id="start" class="input" type="date" value="2020-01-01"></div><div class="field"><label>结束日期</label><input id="end" class="input" type="date"></div><button id="load" class="btn primary">加载K线</button></section><div id="message" class="message"></div><section class="grid"><div class="panel"><div class="head"><strong>K线与成交量</strong><span id="bar-meta" class="m">等待数据</span></div><div class="body"><div id="chart" class="chart"><div class="empty">输入代码和日期后加载</div></div><div class="stats"><div class="stat"><label>最新收盘</label><strong id="last-close">--</strong></div><div class="stat"><label>区间涨跌</label><strong id="period-change">--</strong></div><div class="stat"><label>最高价</label><strong id="high">--</strong></div><div class="stat"><label>最低价</label><strong id="low">--</strong></div></div></div></div><div class="panel"><div class="head"><strong>均线交叉回测</strong><span class="m">次日开盘成交</span></div><div class="body"><div class="form"><div class="field"><label>初始资金</label><input id="cash" class="input" type="number" min="100" step="100" value="100000"></div><div class="field"><label>佣金费率</label><input id="commission" class="input" type="number" min="0" step="0.0001" value="0.0003"></div><div class="field"><label>最低佣金</label><input id="min-commission" class="input" type="number" min="0" step="0.01" value="5"></div><div class="field"><label>印花税率</label><input id="stamp" class="input" type="number" min="0" step="0.0001" value="0.0005"></div><div class="field"><label>过户费率</label><input id="transfer" class="input" type="number" min="0" step="0.00001" value="0.00001"></div><div class="field"><label>滑点率</label><input id="slippage" class="input" type="number" min="0" step="0.0001" value="0.0002"></div><div class="field"><label>快均线</label><input id="fast" class="input" type="number" min="1" value="5"></div><div class="field"><label>慢均线</label><input id="slow" class="input" type="number" min="2" value="20"></div><button id="backtest" class="btn primary wide">运行历史回测</button></div><p class="note">100股整数手，佣金、最低佣金、卖出印花税、双向过户费和滑点均计入。</p><div id="result" hidden><div class="rg"><div class="ri"><span>累计收益</span><strong id="return">--</strong></div><div class="ri"><span>最大回撤</span><strong id="drawdown">--</strong></div><div class="ri"><span>最终权益</span><strong id="equity">--</strong></div><div class="ri"><span>交易次数</span><strong id="trades">--</strong></div></div><div class="tw"><table class="table"><thead><tr><th>日期</th><th>方向</th><th>价格</th><th>数量</th><th>费用</th></tr></thead><tbody id="trade-rows"></tbody></table></div></div></div></div></section><section class="panel" style="margin-top:16px"><div class="head"><strong>市场资金流向</strong><span id="flow-meta" class="m">收盘后快照</span></div><div class="body"><button id="flow-load" class="btn">刷新市场资金流向</button><p id="flow-note" class="note">只展示已验证的市场级数据，不用推荐池替代。</p><div id="flow-list" class="fl"><div class="empty" style="height:100px">尚未加载</div></div></div></section></main><script>
const $=s=>document.querySelector(s),api=()=>$('#api').value.trim().replace(/\/$/,''),money=v=>Number(v).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}),flowMoney=v=>{const n=Number(v),a=Math.abs(n);return `${n>=0?'+':'-'}${(a>=1e8?a/1e8:a/1e4).toFixed(2)}${a>=1e8?'亿':'万'}`},pct=v=>(Number(v)*100).toFixed(2)+'%';let bars=[];function msg(t,s=true){$('#message').textContent=t;$('#message').classList.toggle('show',s)}function valid(){if(!$('#symbol').value.trim())throw Error('请输入股票代码');if($('#start').value>$('#end').value)throw Error('开始日期不能晚于结束日期')}
function draw(){const box=$('#chart');box.innerHTML='<canvas></canvas>';const c=box.querySelector('canvas'),d=devicePixelRatio||1,r=c.getBoundingClientRect();c.width=r.width*d;c.height=r.height*d;const x=c.getContext('2d');x.scale(d,d);const w=r.width,h=r.height,p={l:45,r:15,t:18,b:35},ph=h-p.t-p.b,vh=70,z=bars.flatMap(b=>[b.low,b.high]),lo=Math.min(...z),hi=Math.max(...z),sc=v=>p.t+(hi-v)/(hi-lo||1)*(ph-vh-8),cw=(w-p.l-p.r)/bars.length*.72,mv=Math.max(...bars.map(b=>b.volume||0),1);x.strokeStyle='#2b3644';x.fillStyle='#8b98a8';x.font='11px system-ui';for(let i=0;i<5;i++){const y=p.t+i*(ph-vh)/4;x.beginPath();x.moveTo(p.l,y);x.lineTo(w-p.r,y);x.stroke();x.fillText((hi-(hi-lo)*i/4).toFixed(2),5,y+4)}bars.forEach((b,i)=>{const cx=p.l+(i+.5)*(w-p.l-p.r)/bars.length,u=b.close>=b.open,y1=sc(b.high),y2=sc(b.low),yo=sc(b.open),yc=sc(b.close);x.strokeStyle=u?'#ef5350':'#29b58f';x.fillStyle=x.strokeStyle;x.beginPath();x.moveTo(cx,y1);x.lineTo(cx,y2);x.stroke();x.fillRect(cx-cw/2,Math.min(yo,yc),cw,Math.max(1,Math.abs(yc-yo)));const q=Math.min(vh-4,(b.volume||0)/mv*(vh-8));x.globalAlpha=.45;x.fillRect(cx-cw/2,h-p.b-q,cw,q);x.globalAlpha=1})}
async function load(){try{valid();msg('',false);const u=`${api()}/api/stocks/${encodeURIComponent($('#symbol').value.trim())}/daily?start=${$('#start').value}&end=${$('#end').value}`,r=await fetch(u),j=await r.json();if(!r.ok)throw Error(j.detail||'Market request failed');bars=j.bars||[];if(!bars.length)throw Error('No market data');draw();const a=bars[0].close,b=bars.at(-1).close;$('#last-close').textContent=money(b);$('#period-change').textContent=pct(b/a-1);$('#high').textContent=money(Math.max(...bars.map(x=>x.high)));$('#low').textContent=money(Math.min(...bars.map(x=>x.low)));$('#bar-meta').textContent=`${bars.length} trading days`;$('#status').textContent='Backend connected'}catch(e){msg(e.message);$('#status').textContent='Backend unavailable'}}
async function backtest(){try{if(!bars.length)throw Error('Load K lines first');valid();const body={symbol:$('#symbol').value.trim(),start_date:$('#start').value,end_date:$('#end').value,strategy:'ma_cross',parameters:{fast_period:Number($('#fast').value),slow_period:Number($('#slow').value)},initial_cash:Number($('#cash').value),fees:{commission_rate:Number($('#commission').value),min_commission_cny:Number($('#min-commission').value),stamp_duty_rate:Number($('#stamp').value),transfer_rate:Number($('#transfer').value),slippage_rate:Number($('#slippage').value)}},r=await fetch(`${api()}/api/backtests`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}),j=await r.json();if(!r.ok)throw Error(j.detail||'Backtest request failed');$('#result').hidden=false;$('#return').textContent=pct(j.total_return);$('#drawdown').textContent=pct(j.max_drawdown);$('#equity').textContent=money(j.final_equity);$('#trades').textContent=j.trade_count;$('#trade-rows').innerHTML=(j.trades||[]).map(t=>`<tr><td>${t.trade_date}</td><td>${t.side==='buy'?'买入':'卖出'}</td><td>${money(t.price)}</td><td>${t.quantity}</td><td>${money(t.fees)}</td></tr>`).join('')||'<tr><td colspan="5">No trades</td></tr>'}catch(e){msg(e.message)}}
async function flow(){const l=$('#flow-list');l.innerHTML='<div class="empty" style="height:100px">正在加载...</div>';try{const r=await fetch(`${api()}/api/market-flow?refresh=true`),j=await r.json();if(!r.ok)throw Error(j.detail||'资金流请求失败');$('#flow-meta').textContent=`${j.source||'未知来源'} / ${j.scope||'未知范围'}`;$('#flow-note').textContent=j.warnings?.join('；')||`数据时间：${new Date(j.as_of).toLocaleString('zh-CN')}`;const a=j.sectors||[];if(!a.length){l.innerHTML='<div class="empty" style="height:100px">暂无可验证数据</div>';return}const m=Math.max(...a.map(x=>Math.abs(Number(x.net_inflow_cny)||0)),1);l.innerHTML=a.map(x=>{const v=Number(x.net_inflow_cny)||0;return `<div class="fr"><div><strong>${String(x.name)}</strong><div class="bar"><i class="${v<0?'out':''}" style="width:${Math.max(4,Math.abs(v)/m*100)}%"></i></div></div><strong class="${v>=0?'up':'down'}">${flowMoney(v)}</strong><span>${Number(x.change_pct||0).toFixed(2)}%</span></div>`}).join('')}catch(e){$('#flow-meta').textContent='暂不可用';l.innerHTML='<div class="empty" style="height:100px">市场资金流暂不可用</div>';$('#flow-note').textContent=e.message}}
$('#load').onclick=load;$('#backtest').onclick=backtest;$('#flow-load').onclick=flow;$('#end').value=new Date().toISOString().slice(0,10);fetch(`${api()}/api/health`).then(r=>{if(!r.ok)throw 0;$('#status').textContent='后端已连接'}).catch(()=>$('#status').textContent='后端不可用');</script><script>
/* 覆盖首版请求逻辑：显示真实错误、禁止重复提交，并标注数据来源。 */
function apiError(payload,fallback){
  const detail=payload&&payload.detail!==undefined?payload.detail:payload;
  if(typeof detail==='string')return detail;
  if(detail&&typeof detail==='object'){
    const attempted=Array.isArray(detail.attempted_sources)&&detail.attempted_sources.length?`（${detail.attempted_sources.join('；')}）`:'';
    return `${detail.message||fallback}${attempted}`;
  }
  return fallback;
}
function setBusy(button,busy,text){
  if(!button.dataset.label)button.dataset.label=button.textContent;
  button.disabled=busy;button.style.opacity=busy?'.65':'1';button.style.cursor=busy?'wait':'pointer';
  button.textContent=busy?text:button.dataset.label;
}
async function readResponse(response){
  const raw=await response.text();
  try{return raw?JSON.parse(raw):{}}catch{return {detail:raw}}
}
async function load(){
  const button=$('#load');
  try{
    valid();msg('',false);setBusy(button,true,'正在加载...');
    const u=`${api()}/api/stocks/${encodeURIComponent($('#symbol').value.trim())}/daily?start=${$('#start').value}&end=${$('#end').value}`;
    const r=await fetch(u),j=await readResponse(r);
    if(!r.ok)throw Error(apiError(j,'行情加载失败'));
    bars=j.bars||[];
    if(!bars.length)throw Error('该日期范围没有可用交易日行情');
    draw();
    const a=bars[0].close,b=bars.at(-1).close;
    $('#last-close').textContent=money(b);$('#period-change').textContent=pct(b/a-1);
    $('#high').textContent=money(Math.max(...bars.map(x=>x.high)));$('#low').textContent=money(Math.min(...bars.map(x=>x.low)));
    const source={cache:'本地缓存',baostock:'Baostock',akshare:'AkShare','cache-stale':'缓存（数据源故障）'}[j.data_source]||j.data_source||'未知来源';
    $('#bar-meta').textContent=`${bars.length} 个交易日 · ${source}`;
    $('#status').textContent='后端已连接';
    if(j.warnings?.length)msg(j.warnings.join('；'));
  }catch(e){bars=[];$('#chart').innerHTML='<div class="empty">行情尚未加载</div>';msg(e.message||'行情加载失败');$('#status').textContent='后端可达，但行情暂不可用'}finally{setBusy(button,false,'')}
}
async function backtest(){
  const button=$('#backtest');
  try{
    if(!bars.length)throw Error('先点击“加载K线”，确认行情数据可用后再回测');
    valid();msg('',false);setBusy(button,true,'正在回测...');
    const body={symbol:$('#symbol').value.trim(),start_date:$('#start').value,end_date:$('#end').value,strategy:'ma_cross',parameters:{fast_period:Number($('#fast').value),slow_period:Number($('#slow').value)},initial_cash:Number($('#cash').value),fees:{commission_rate:Number($('#commission').value),min_commission_cny:Number($('#min-commission').value),stamp_duty_rate:Number($('#stamp').value),transfer_rate:Number($('#transfer').value),slippage_rate:Number($('#slippage').value)}};
    const r=await fetch(`${api()}/api/backtests`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}),j=await readResponse(r);
    if(!r.ok)throw Error(apiError(j,'回测请求失败'));
    $('#result').hidden=false;$('#return').textContent=pct(j.total_return);$('#drawdown').textContent=pct(j.max_drawdown);$('#equity').textContent=money(j.final_equity);$('#trades').textContent=j.trade_count;
    $('#trade-rows').innerHTML=(j.trades||[]).map(t=>`<tr><td>${t.trade_date}</td><td>${t.side==='buy'?'买入':'卖出'}</td><td>${money(t.price)}</td><td>${t.quantity}</td><td>${money(t.fees)}</td></tr>`).join('')||'<tr><td colspan="5">该区间未产生均线交叉交易信号</td></tr>';
    const source={cache:'本地缓存',baostock:'Baostock',akshare:'AkShare','cache-stale':'缓存（数据源故障）'}[j.data_source]||j.data_source||'未知来源';
    $('#bar-meta').textContent=`${bars.length} 个交易日 · 回测来源：${source}`;
    if(j.warnings?.length)msg(j.warnings.join('；'));
  }catch(e){msg(e.message||'回测失败')}finally{setBusy(button,false,'')}
}
$('#load').onclick=load;$('#backtest').onclick=backtest;
</script></body></html>
