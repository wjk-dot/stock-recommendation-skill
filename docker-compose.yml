services:
  quant-backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      STOCK_DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  quant-web:
    image: nginx:1.27-alpine
    ports:
      - "8765:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./templates:/usr/share/nginx/html/templates:ro
      # render_gui.py 生成的带本次推荐数据的 VANTA 页面通过 /app/ 提供。
      # 这样页面和 /api/ 同源，K 线、回测与资金流接口不会被 file:// CORS 阻断。
      - ./:/usr/share/nginx/html/app:ro
    depends_on:
      quant-backend:
        condition: service_healthy
